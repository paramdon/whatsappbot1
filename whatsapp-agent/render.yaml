services:
  - type: web
    name: whatsapp-appointment-agent
    env: node
    region: singapore  # closest to India
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        sync: false   # set in Render dashboard
      - key: COHERE_API_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: KEEP_ALIVE_URL
        sync: false   # set to your Render URL + /ping
    disk:
      name: wa-agent-data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /ping
